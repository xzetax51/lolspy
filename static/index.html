<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Шпион: LoL Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --lol-gold: #c8aa6e;
            --lol-gold-light: #f0e6d2;
            --lol-turquoise: #0ac8b9;
            --lol-dark: #010a13;
            --lol-dark-light: #091428;
            --lol-red: #e84057;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--lol-dark);
            color: var(--lol-gold-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            color: var(--lol-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: var(--lol-turquoise);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .card {
            background: linear-gradient(135deg, var(--lol-dark-light) 0%, #0a1428 100%);
            border: 2px solid var(--lol-gold);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(200, 170, 110, 0.15);
        }
        .champion-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--lol-gold);
            box-shadow: 0 0 25px rgba(10, 200, 185, 0.4);
            margin-bottom: 15px;
            object-fit: cover;
            background-color: #000;
        }
        .spy-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--lol-red);
            box-shadow: 0 0 25px rgba(232, 64, 87, 0.4);
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background-color: #1a0505;
        }
        .card-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--lol-gold);
            margin: 10px 0;
        }
        .card-hint {
            color: var(--lol-turquoise);
            font-size: 0.95rem;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--lol-dark);
            border: 1px solid var(--lol-gold);
            color: var(--lol-gold-light);
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        input::placeholder {
            color: #6b7280;
            text-transform: none;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: linear-gradient(to right, #1e282d, #0a1428);
            border: 1px solid var(--lol-gold);
            color: var(--lol-gold);
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active {
            background: var(--lol-gold);
            color: var(--lol-dark);
        }
        button.secondary {
            border-color: var(--lol-turquoise);
            color: var(--lol-turquoise);
        }
        button.secondary:active {
            background: var(--lol-turquoise);
            color: var(--lol-dark);
        }
        .player-list {
            text-align: left;
            margin: 15px 0;
        }
        .player-item {
            padding: 10px;
            border-bottom: 1px solid rgba(200, 170, 110, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-item.host {
            color: var(--lol-turquoise);
        }
        .player-item .badge {
            font-size: 0.75rem;
            background: var(--lol-gold);
            color: var(--lol-dark);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .order-list {
            text-align: left;
            margin: 15px 0;
            padding-left: 20px;
        }
        .order-list li {
            margin: 8px 0;
            color: var(--lol-gold-light);
        }
        .vote-btn {
            margin: 5px 0;
            text-transform: none;
            font-weight: normal;
        }
        .vote-btn.voted {
            background: var(--lol-turquoise);
            color: var(--lol-dark);
            border-color: var(--lol-turquoise);
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.9rem;
        }
        .results-table th, .results-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(200, 170, 110, 0.2);
            text-align: left;
        }
        .results-table th {
            color: var(--lol-turquoise);
        }
        .hidden { display: none !important; }
        .error { color: var(--lol-red); font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕵️ Шпион: LoL</h1>
        <div class="subtitle">Найди шпиона, не выдав себя</div>

        <!-- ЭКРАН ВХОДА -->
        <div id="screen-login" class="card">
            <input type="text" id="join-code" placeholder="Код лобби (например, A1B2C)" maxlength="5">
            <button onclick="joinLobby()">Присоединиться</button>
            <div style="margin: 15px 0; color: var(--lol-gold);">— или —</div>
            <button class="secondary" onclick="createLobby()">Создать новое лобби</button>
            <div id="login-error" class="error"></div>
        </div>

        <!-- ЭКРАН ЛОББИ -->
        <div id="screen-lobby" class="hidden">
            <div class="card">
                <div style="font-size: 0.9rem; color: var(--lol-turquoise);">КОД ЛОББИ</div>
                <div id="lobby-code" style="font-size: 2rem; font-weight: bold; color: var(--lol-gold); letter-spacing: 3px; margin: 10px 0;"></div>
                <button class="secondary" onclick="copyCode()">📋 Скопировать код</button>
            </div>
            <div class="card">
                <div style="text-align: left; margin-bottom: 10px; color: var(--lol-gold);">Игроки (<span id="player-count">0</span>/<span id="min-players">3</span>)</div>
                <div id="player-list" class="player-list"></div>
                <button id="btn-start" class="hidden" onclick="startGame()">🎮 Начать игру</button>
                <button class="secondary" onclick="leaveLobby()">🚪 Выйти из лобби</button>
            </div>
        </div>

        <!-- ЭКРАН КАРТОЧКИ -->
        <div id="screen-card" class="hidden">
            <div class="card">
                <div style="font-size: 0.9rem; color: var(--lol-turquoise); margin-bottom: 10px;">ВАША КАРТОЧКА</div>
                <div id="card-avatar-container"></div>
                <div id="card-name" class="card-title"></div>
                <div id="card-hint" class="card-hint"></div>
            </div>
            <div class="card">
                <div style="text-align: left; color: var(--lol-gold); margin-bottom: 10px;">📜 Порядок ходов:</div>
                <ol id="order-list" class="order-list"></ol>
            </div>
            <button id="btn-begin-voting" class="hidden" onclick="beginVoting()">🗳️ Начать голосование</button>
            <div style="margin-top: 20px; font-size: 0.85rem; color: #6b7280;">Ожидайте действия хоста...</div>
        </div>

        <!-- ЭКРАН ГОЛОСОВАНИЯ -->
        <div id="screen-voting" class="hidden">
            <div class="card">
                <div style="font-size: 1.1rem; color: var(--lol-gold); margin-bottom: 15px;">Кто шпион?</div>
                <div id="vote-list"></div>
                <button class="secondary vote-btn" onclick="castVote('skip')">🤷 Пропустить / Не знаю</button>
                <div style="margin-top: 15px; font-size: 0.9rem; color: var(--lol-turquoise);">
                    Голосов: <span id="votes-cast">0</span> / <span id="votes-total">0</span>
                </div>
            </div>
            <button id="btn-reveal" class="hidden" onclick="revealNow()">⚡ Раскрыть сейчас</button>
        </div>

        <!-- ЭКРАН РЕЗУЛЬТАТОВ -->
        <div id="screen-results" class="hidden">
            <div class="card">
                <div id="result-title" style="font-size: 1.3rem; font-weight: bold; margin-bottom: 15px;"></div>
                <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
                    <div>
                        <div style="font-size: 0.8rem; color: var(--lol-turquoise);">Шпион</div>
                        <div id="res-spy" style="font-size: 1.1rem; color: var(--lol-red); font-weight: bold;"></div>
                    </div>
                    <div>
                        <div style="font-size: 0.8rem; color: var(--lol-turquoise);">Чемпион</div>
                        <div id="res-champ" style="font-size: 1.1rem; color: var(--lol-gold); font-weight: bold;"></div>
                    </div>
                </div>
                <table class="results-table">
                    <thead><tr><th>Игрок</th><th>Голоса</th></tr></thead>
                    <tbody id="res-tally"></tbody>
                </table>
            </div>
            <button id="btn-play-again" class="hidden" onclick="playAgain()">🔄 Новый раунд</button>
            <button class="secondary" onclick="leaveLobby()">🚪 Выйти в меню</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe?.user;
        const userId = user?.id?.toString() || 'guest_' + Math.random().toString(36).substr(2, 9);
        const userName = user?.first_name || 'Игрок';

        let currentCode = '';
        let pollInterval = null;

        function showScreen(id) {
            document.querySelectorAll('.container > div[id^="screen-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showError(msg) {
            const el = document.getElementById('login-error');
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 3000);
        }

        async function api(endpoint, method = 'GET', body = null) {
            const url = `/api${endpoint}`;
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            try {
                const res = await fetch(url, options);
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Ошибка сервера');
                }
                return await res.json();
            } catch (e) {
                console.error('API Error:', e);
                throw e;
            }
        }

        async function createLobby() {
            try {
                const data = await api('/create', 'POST', { user_id: userId, name: userName });
                currentCode = data.code;
                startPolling();
            } catch (e) { showError(e.message); }
        }

        async function joinLobby() {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if (code.length !== 5) return showError('Введите корректный 5-символьный код');
            try {
                const data = await api('/join', 'POST', { code, user_id: userId, name: userName });
                currentCode = code;
                startPolling();
            } catch (e) { showError(e.message); }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            updateState();
            pollInterval = setInterval(updateState, 1800);
        }

        async function updateState() {
            if (!currentCode) return;
            try {
                const data = await api(`/state/${currentCode}?user_id=${userId}`);
                renderState(data);
            } catch (e) {
                // Лобби могло удалиться
                clearInterval(pollInterval);
                currentCode = '';
                showScreen('screen-login');
            }
        }

        function renderState(data) {
            if (data.status === 'lobby') {
                showScreen('screen-lobby');
                document.getElementById('lobby-code').textContent = data.code;
                document.getElementById('player-count').textContent = data.players.length;
                document.getElementById('min-players').textContent = data.min_players;
                
                const list = document.getElementById('player-list');
                list.innerHTML = data.players.map(p => 
                    `<div class="player-item ${p.is_host ? 'host' : ''}">
                        <span>${p.name} ${p.user_id === userId ? '(Вы)' : ''}</span>
                        ${p.is_host ? '<span class="badge">ХОСТ</span>' : ''}
                    </div>`
                ).join('');

                const btnStart = document.getElementById('btn-start');
                if (data.host_id === userId && data.players.length >= data.min_players) {
                    btnStart.classList.remove('hidden');
                } else {
                    btnStart.classList.add('hidden');
                }
            } 
            else if (data.status === 'playing') {
                showScreen('screen-card');
                const avatarContainer = document.getElementById('card-avatar-container');
                if (data.is_spy) {
                    avatarContainer.innerHTML = `<div class="spy-avatar">🕵️</div>`;
                    document.getElementById('card-hint').textContent = 'Вы не знаете чемпиона. Слушайте внимательно и не выдавайте себя!';
                } else {
                    avatarContainer.innerHTML = `<img src="${data.card_avatar}" class="champion-avatar" alt="${data.card}" onerror="this.style.display='none'">`;
                    document.getElementById('card-hint').textContent = 'Все мирные жители знают этого чемпиона. Задавайте наводящие вопросы!';
                }
                document.getElementById('card-name').textContent = data.card;
                
                document.getElementById('order-list').innerHTML = data.order.map((p, i) => 
                    `<li>${i + 1}. ${p.name} ${p.user_id === userId ? '<b>(Вы)</b>' : ''}</li>`
                ).join('');

                const btnBegin = document.getElementById('btn-begin-voting');
                if (data.host_id === userId) btnBegin.classList.remove('hidden');
                else btnBegin.classList.add('hidden');
            } 
            else if (data.status === 'voting') {
                showScreen('screen-voting');
                document.getElementById('votes-cast').textContent = data.votes_cast.length;
                document.getElementById('votes-total').textContent = data.votes_total;
                
                const voteList = document.getElementById('vote-list');
                voteList.innerHTML = data.players.filter(p => p.user_id !== userId).map(p => {
                    const isVoted = data.your_vote === p.user_id;
                    return `<button class="vote-btn ${isVoted ? 'voted' : ''}" onclick="castVote('${p.user_id}')">
                        🗳️ ${p.name} ${p.user_id === data.host_id ? '(Хост)' : ''}
                    </button>`;
                }).join('');

                const btnReveal = document.getElementById('btn-reveal');
                if (data.host_id === userId) btnReveal.classList.remove('hidden');
                else btnReveal.classList.add('hidden');
            } 
            else if (data.status === 'results') {
                showScreen('screen-results');
                const res = data.results;
                document.getElementById('result-title').textContent = res.players_caught_spy ? '🎉 Шпион пойман!' : '😈 Шпион сбежал!';
                document.getElementById('result-title').style.color = res.players_caught_spy ? 'var(--lol-turquoise)' : 'var(--lol-red)';
                
                document.getElementById('res-spy').textContent = res.spy_name;
                document.getElementById('res-champ').textContent = res.common_champion;
                
                document.getElementById('res-tally').innerHTML = res.tally.map(t => 
                    `<tr><td>${t.name}</td><td style="text-align: right; font-weight: bold;">${t.votes}</td></tr>`
                ).join('');

                const btnAgain = document.getElementById('btn-play-again');
                if (data.host_id === userId) btnAgain.classList.remove('hidden');
                else btnAgain.classList.add('hidden');
            }
        }

        async function startGame() { await api('/start', 'POST', { code: currentCode, user_id: userId }); }
        async function beginVoting() { await api('/begin_voting', 'POST', { code: currentCode, user_id: userId }); }
        async function castVote(target) { await api('/vote', 'POST', { code: currentCode, user_id: userId, target_id: target }); }
        async function revealNow() { await api('/reveal', 'POST', { code: currentCode, user_id: userId }); }
        async function playAgain() { await api('/play_again', 'POST', { code: currentCode, user_id: userId }); }
        
        async function leaveLobby() {
            if (currentCode) {
                await api('/leave', 'POST', { code: currentCode, user_id: userId }).catch(() => {});
            }
            currentCode = '';
            if (pollInterval) clearInterval(pollInterval);
            showScreen('screen-login');
        }

        function copyCode() {
            navigator.clipboard.writeText(currentCode).then(() => {
                tg.showPopup({ title: 'Скопировано!', message: `Код ${currentCode} скопирован в буфер обмена` });
            });
        }
    </script>
</body>
</html>
